<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pas la bonne pointure</title>
    <style>
        /* Style général de la page */
        body {
            background-color: black;
            color: white;
            font-family: "Arial Black", Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            /* Pour que le footer absolu fonctionne bien */
            min-height: 100vh;
            box-sizing: border-box;
            position: relative; 
        }

        /*Position logo*/
        .logo-top-left {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 70px;
        }

        /* Conteneur principal pour centrer le contenu verticalement un peu */
        .main-content {
            margin-top: 80px; /* Espace pour ne pas coller au logo sur téléphone */
            padding-bottom: 40px; /* Espace pour ne pas coller au footer */
        }

        /* Le gros texte blanc */
        .gros-texte-blanc {
            font-size: 28px; /* Taille pour mobile */
            line-height: 1.3;
            margin-bottom: 10px;
        }

        /* La partie du texte en ROUGE */
        .texte-rouge {
            color: red;
            font-size: 32px; /* Un peu plus gros que le blanc */
        }

        /* L'image de la boîte au milieu */
        .boite-centrale {
            width: 150px; 
            max-width: 60%; 
            margin-top: 40px;
            margin-bottom: 40px;
        }

        /*question en bas */
        .question-bas {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        
        /* boutons */
        .boutons-container {
            display: flex;
            justify-content: center;
            gap: 20px; 
            flex-wrap: wrap; /* Permet aux boutons de passer l'un sous l'autre pour iphones */
        }

        /* Style des boutons rouges */
        .btn-rouge {
            background-color: red;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            font-family: "Arial Black", Arial, sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s ease; 
        }

        .btn-rouge:hover {
            transform: scale(1.05); /* effet de grossissement sur le bouton au survol */
        }


        /*Ajustements pour PC */
        @media (min-width: 768px) {
            .main-content { margin-top: 120px; }
            .logo-top-left { width: 90px; }
            .gros-texte-blanc { font-size: 50px; }
            .texte-rouge { font-size: 55px; }
            .boite-centrale { width: 200px; margin-top: 60px; margin-bottom: 60px; }
            .question-bas { font-size: 22px; }
            .btn-rouge { font-size: 24px; padding: 20px 40px; }
        }
    </style>
</head>
<body>

    <img src="logo.png" class="logo-top-left" alt="Foot Locker Logo">

    <div class="main-content">
        <div class="gros-texte-blanc">
            La Paire de chaussure<br>
            n'etait malheureusement pas
        </div>
        <div class="gros-texte-blanc texte-rouge">
            a votre POINTURE...
        </div>

        <img src="boîte.png" class="boite-centrale" alt="Boite Nike">

        <div class="question-bas">
            voulez-vous continuer a la rechercher?
        </div>

        <div class="boutons-container">
            <button class="btn-rouge">JE LA VEUX !</button>
            <button class="btn-rouge">S'en aller...</button>
        </div>

    </div>

</body>
</html>
